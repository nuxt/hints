name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {contents: read}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
      - uses: pnpm/action-setup@3a0024f0665291c8c6c9957134b033a5e639e837
        name: Install pnpm
      - name: Install Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm dev:prepare
      - run: pnpm prepack
      - run: pnpm test:types
      - run: pnpm lint
      - run: pnpm test
